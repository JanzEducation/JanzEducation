---
layout: null
---
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog & Updates | Janz Education</title>
    <meta name="description" content="राजस्थान लैब असिस्टेंट और अन्य प्रतियोगी परीक्षाओं के ताज़ा अपडेट्स और न्यूज़।">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif; background: #f8fafc; }</style>
</head>
<body class="pb-20">

    <div class="bg-gradient-to-r from-slate-900 to-blue-900 text-white p-6 rounded-b-[2.5rem] shadow-lg mb-8 border-b-4 border-yellow-400">
        <div class="max-w-2xl mx-auto flex justify-between items-center mt-2">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase text-yellow-400">Janz Updates</h1>
                <p class="text-[10px] opacity-90 font-bold uppercase tracking-widest mt-1">Latest News & Study Material</p>
            </div>
            <button onclick="window.location.href='index.html'" class="bg-white/10 hover:bg-white/20 p-2.5 rounded-xl border border-white/20 transition-all">
                🏠 Home
            </button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4 space-y-5">

        {% for post in site.posts %}
        <a href="{{ site.url }}{{ post.url }}" class="block bg-white p-5 rounded-3xl shadow-sm border border-slate-100 hover:border-blue-400 hover:shadow-md transition-all group">
            <div class="flex justify-between items-start mb-3">
                <span class="text-[9px] font-black text-blue-700 bg-blue-50 px-3 py-1 rounded-lg uppercase tracking-wider">{{ post.date | date: "%d %b %Y" }}</span>
                <span class="text-[10px] font-bold text-slate-300 group-hover:text-blue-500">Read ➔</span>
            </div>
            <h2 class="text-[15px] font-bold text-slate-800 group-hover:text-blue-900 transition-colors leading-snug">{{ post.title }}</h2>
            <p class="text-xs text-slate-500 mt-2 leading-relaxed line-clamp-2">{{ post.description }}</p>
        </a>
        {% endfor %}

    </div>
</body>
</html>
