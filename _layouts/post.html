<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Janz Education</title>
    <meta name="description" content="{{ page.description }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif; background: #ffffff; }</style>
</head>
<body>

    <div class="bg-slate-50 border-b border-slate-100 p-4 sticky top-0 z-50">
        <div class="max-w-2xl mx-auto">
            <button onclick="window.location.href='/blog.html'" class="text-xs font-bold text-slate-600 bg-white border border-slate-200 px-4 py-2 rounded-xl shadow-sm hover:bg-slate-100 transition">
                ⬅ Back to Blog
            </button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto p-5 pb-20 mt-4">
        <span class="text-[10px] font-black text-blue-700 bg-blue-50 px-3 py-1 rounded-lg uppercase tracking-wider">Education News</span>
        <h1 class="text-2xl font-black text-slate-900 mt-4 leading-tight">{{ page.title }}</h1>
        
        <div class="flex items-center gap-3 mt-6 mb-8 border-b border-slate-100 pb-6">
            <div class="w-10 h-10 bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-full flex items-center justify-center text-white text-sm font-black shadow-md">JE</div>
            <div>
                <p class="text-xs font-bold text-slate-800">Janz Team</p>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">{{ page.date | date: "%d %b %Y" }}</p>
            </div>
        </div>

        <div class="text-sm font-medium text-slate-700 leading-loose space-y-6">
            {{ content }}
        </div>
    </div>

</body>
</html>
